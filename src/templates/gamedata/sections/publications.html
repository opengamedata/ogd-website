<!-- function renderPublicationsSection(?GameDetails $game_details) -->

<section id="publications" class="mb-5">
  <!-- Publications -->
  <h3>Publications</h3>
  <ul class="list-unstyled mt-4">'
    {% if game_details %}
      {% for publication in game_details.Publications %}
        <li class="mb-4 d-flex align-items-start">
          <img class="me-3" src="assets/images/icons/publication.svg" alt="Icon for a publication">
          <div>{{publication.FormattedPublication}}</div>
        </li>
      {% endfor %}
    {% else %}
      <li class="mb-4 d-flex align-items-start">
        NO PUBLICATIONS AVAILABLE, GAME DETAILS NOT FOUND!
      </li>'
    {% endif %}
  </ul>
</section>
